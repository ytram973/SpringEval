<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — TodoList">TodoList</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        .badge-todo       { background-color: #6c757d; }
        .badge-inprogress { background-color: #0d6efd; }
        .badge-done       { background-color: #198754; }
        .task-overdue     { border-left: 4px solid #dc3545 !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">TodoList</a>
        <div class="navbar-nav ms-auto">
            <th:block th:if="${session.connectedUser == null}">
                <a class="nav-link" href="/login">Connexion</a>
                <a class="nav-link" href="/register">Inscription</a>
            </th:block>
            <th:block th:if="${session.connectedUser != null}">
                <span class="nav-link text-light"
                      th:text="'Bonjour, ' + ${session.connectedUser.username}"></span>
                <a class="nav-link" href="/tasks">Mes tâches</a>
                <a class="nav-link" href="/logout">Déconnexion</a>
            </th:block>
        </div>
    </div>
</nav>

<div class="container" layout:fragment="content">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

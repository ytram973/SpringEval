<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Tâche</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="card-title mb-4"
                        th:text="${task != null} ? 'Modifier la tâche' : 'Nouvelle tâche'"></h4>

                    <form method="post"
                          th:action="${task != null} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}">

                        <div class="mb-3">
                            <label class="form-label">Nom *</label>
                            <input type="text" name="name" class="form-control"
                                   required maxlength="100"
                                   th:value="${task?.name}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control"
                                      rows="3" maxlength="500"
                                      th:text="${task?.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date d'échéance</label>
                            <input type="date" name="dueDate" class="form-control"
                                   th:value="${task?.dueDate}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Catégorie</label>
                            <select name="categoryId" class="form-select">
                                <option value="">Aucune catégorie</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${task?.category?.id == cat.id}"></option>
                            </select>
                        </div>

                        <div class="mb-3" th:if="${task != null}">
                            <label class="form-label">Statut</label>
                            <select name="status" class="form-select">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${task.status == s}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                Enregistrer
                            </button>
                            <a href="/tasks" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>

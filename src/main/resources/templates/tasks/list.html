<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Mes tâches</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Mes tâches</h3>
        <a href="/tasks/new" class="btn btn-primary">+ Nouvelle tâche</a>
    </div>

    <!-- Recherche et filtre -->
    <form method="get" action="/tasks" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="search" class="form-control"
                   placeholder="Rechercher..." th:value="${search}">
        </div>
        <div class="col-md-4">
            <select name="category" class="form-select">
                <option value="">Toutes les catégories</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-outline-secondary w-100">
                Filtrer
            </button>
        </div>
    </form>

    <!-- Liste des tâches -->
    <div th:if="${tasks.empty}" class="text-center text-muted py-5">
        Aucune tâche trouvée.
        <a href="/tasks/new">Créer une tâche</a>
    </div>

    <div class="card mb-2" th:each="task : ${tasks}"
         th:classappend="${task.dueDate != null and task.dueDate.isBefore(T(java.time.LocalDate).now())} ? 'task-overdue' : ''">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h6 class="mb-1" th:text="${task.name}"></h6>
                <small class="text-muted" th:text="${task.description}"></small>
                <div class="mt-1">
                    <span class="badge"
                          th:classappend="${task.status.name() == 'TODO'} ? 'badge-todo' :
                                          (${task.status.name() == 'IN_PROGRESS'} ? 'badge-inprogress' : 'badge-done')"
                          th:text="${task.status}"></span>
                    <span class="badge bg-secondary ms-1"
                          th:if="${task.category != null}"
                          th:text="${task.category.name}"></span>
                    <small class="text-muted ms-2"
                           th:if="${task.dueDate != null}"
                           th:text="'Échéance : ' + ${task.dueDate}"></small>
                </div>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/tasks/{id}/edit(id=${task.id})}"
                   class="btn btn-sm btn-outline-primary">Modifier</a>
                <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
                      onsubmit="return confirm('Supprimer cette tâche ?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        Supprimer
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
